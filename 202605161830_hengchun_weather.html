
<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>恆春鎮天氣預報報表</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #FFFDF9; /* 溫暖淺米白 */
            color: #4A3728; /* 深暖咖 */
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 800px;
            width: 100%;
            background: #FFFFFF;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(218, 165, 32, 0.15);
            border-top: 6px solid #E67E22; /* 溫暖橘橘條 */
        }
        h2 {
            color: #D35400;
            text-align: center;
            margin-bottom: 5px;
        }
        .timestamp {
            text-align: center;
            color: #7F8C8D;
            font-size: 0.9em;
            margin-bottom: 30px;
        }
        .chart-container {
            position: relative;
            margin: auto;
            height: 350px;
            width: 100%;
            margin-bottom: 40px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background-color: #FFF9F2;
        }
        th, td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #F3E5D8;
        }
        th {
            background-color: #E67E22;
            color: white;
            font-weight: bold;
        }
        tr:hover {
            background-color: #FFEEDD;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>恆春鎮天氣預報 (未來 12 小時)</h2>
    <div class="timestamp">報表生成時間：2026-05-16 18:30:39</div>
    
    <div class="chart-container">
        <canvas id="weatherChart"></canvas>
    </div>

    <table>
        <thead>
            <tr>
                <th>時間 (時間區段起點)</th>
                <th>溫度 (°C)</th>
                <th>相對濕度 (%)</th>
            </tr>
        </thead>
        <tbody>
            
        </tbody>
    </table>
</div>

<script>
const ctx = document.getElementById('weatherChart').getContext('2d');
const weatherChart = new Chart(ctx, {
    type: 'line',
    data: {
        labels: [],
        datasets: [
            {
                label: '溫度 (°C)',
                data: [],
                borderColor: '#E67E22',
                backgroundColor: 'rgba(230, 126, 34, 0.1)',
                borderWidth: 3,
                yAxisID: 'y-temp',
                tension: 0.3,
                pointRadius: 4
            },
            {
                label: '相對濕度 (%)',
                data: [],
                borderColor: '#3498DB',
                backgroundColor: 'rgba(52, 152, 219, 0.05)',
                borderWidth: 3,
                yAxisID: 'y-rh',
                tension: 0.3,
                pointRadius: 4,
                borderDash: [5, 5]
            }
        ]
    },
    options: {
        responsive: true,
        maintainAspectRatio: false,
        scales: {
            'y-temp': {
                type: 'linear',
                position: 'left',
                title: { display: true, text: '溫度 (°C)', color: '#E67E22' }
            },
            'y-rh': {
                type: 'linear',
                position: 'right',
                grid: { drawOnChartArea: false },
                title: { display: true, text: '相對濕度 (%)', color: '#3498DB' }
            }
        }
    }
});
</script>

</body>
</html>
